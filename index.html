<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOCHI ✦ Flasher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
<style>
:root {
  --bg:      #fff4f8;
  --surface: #ffffff;
  --border:  #f5c6d8;
  --border2: #f0a8c4;
  --ink:     #5a2d42;
  --muted:   #c98aaa;
  --pink:    #f06090;
  --pinkL:   #fce4ed;
  --pinkD:   #e04878;
  --rose:    #fdf0f5;
  --shadow:  0 8px 32px rgba(240,96,144,.12);
  --shadowLg:0 16px 48px rgba(240,96,144,.18);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Quicksand', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

/* bg blobs */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(90px);
  pointer-events: none;
  z-index: 0;
}
body::before {
  width: 420px; height: 420px;
  background: rgba(240,96,144,.09);
  top: -120px; right: -100px;
  animation: blobDrift 12s ease-in-out infinite alternate;
}
body::after {
  width: 320px; height: 320px;
  background: rgba(220,140,200,.07);
  bottom: -80px; left: -80px;
  animation: blobDrift 15s ease-in-out infinite alternate-reverse;
}
@keyframes blobDrift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(30px, 20px) scale(1.1); }
}

.wrap {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
}

/* ── HEADER ── */
header {
  text-align: center;
  margin-bottom: 4px;
  opacity: 0;
  animation: riseIn .6s cubic-bezier(.34,1.4,.64,1) .05s forwards;
}
.icon {
  font-size: 4rem; display: block; line-height: 1;
  margin-bottom: 10px;
  animation: bob 3.5s ease-in-out infinite;
  filter: drop-shadow(0 6px 14px rgba(240,96,144,.25));
}
@keyframes bob {
  0%,100% { transform: translateY(0) rotate(-2deg); }
  50%      { transform: translateY(-8px) rotate(2deg); }
}
h1 {
  font-family: 'Baloo 2', sans-serif;
  font-size: 3rem; font-weight: 700;
  color: var(--pink);
  letter-spacing: .02em; line-height: 1;
}
h1 small {
  display: block;
  font-size: .88rem; font-weight: 700;
  color: var(--muted);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-top: 5px;
}

@keyframes riseIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── CARD ── */
.card {
  width: 100%;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 26px;
  padding: 24px;
  box-shadow: var(--shadow);
  opacity: 0;
  animation: riseIn .55s cubic-bezier(.34,1.3,.64,1) forwards;
  transition: box-shadow .25s, transform .25s;
}
.card:hover {
  box-shadow: var(--shadowLg);
  transform: translateY(-2px);
}
.card:nth-of-type(1) { animation-delay: .18s; }
.card:nth-of-type(2) { animation-delay: .3s; }

/* ── DEVICE ROW ── */
.device-row {
  display: flex; align-items: center; gap: 14px;
  padding-bottom: 18px;
  margin-bottom: 18px;
  border-bottom: 2px dashed var(--border);
}
.device-thumb {
  width: 54px; height: 54px; flex-shrink: 0;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--pinkL), #fde8f5);
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.7rem;
  box-shadow: 0 3px 12px rgba(240,96,144,.15);
}
.device-info {}
.device-name {
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.15rem; font-weight: 600;
  color: var(--ink); line-height: 1.1;
}
.device-sub {
  font-size: .72rem; color: var(--muted);
  font-weight: 700; margin-top: 3px;
  display: flex; align-items: center; gap: 5px;
}
.dot-ver {
  display: inline-block;
  padding: 1px 8px;
  background: var(--pinkL);
  border: 1px solid var(--border2);
  border-radius: 100px;
  color: var(--pinkD);
  font-size: .65rem; font-weight: 800;
}

/* ── SPECS ── */
.specs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 20px;
}
.spec {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  background: var(--rose);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  transition: border-color .18s, background .18s;
}
.spec:hover { border-color: var(--border2); background: var(--pinkL); }
.spec-icon { font-size: 1.1rem; flex-shrink: 0; }
.spec-val  { font-size: .78rem; font-weight: 800; color: var(--ink); }
.spec-key  { font-size: .65rem; font-weight: 600; color: var(--muted); margin-top: 1px; }

/* ── FLASH BUTTON AREA ── */
.flash-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}

esp-web-install-button::part(button),
.btn-flash {
  display: inline-flex; align-items: center; gap: 9px;
  background: linear-gradient(135deg, #f05888 0%, #f080b8 100%);
  color: #fff; border: none;
  border-radius: 100px;
  padding: 15px 36px;
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.1rem; font-weight: 600;
  letter-spacing: .04em;
  cursor: pointer;
  box-shadow: 0 6px 22px rgba(240,96,144,.4), 0 2px 6px rgba(240,80,136,.2);
  transition: all .22s cubic-bezier(.34,1.56,.64,1);
  width: 100%;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
esp-web-install-button::part(button)::after,
.btn-flash::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.18) 0%, transparent 60%);
  pointer-events: none;
}
esp-web-install-button::part(button):hover,
.btn-flash:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 10px 32px rgba(240,96,144,.5), 0 4px 10px rgba(240,80,136,.25);
}
esp-web-install-button::part(button):active,
.btn-flash:active {
  transform: scale(.97);
  box-shadow: 0 3px 12px rgba(240,96,144,.3);
}

.flash-hint {
  font-size: .72rem; color: var(--muted); font-weight: 700;
  display: flex; align-items: center; gap: 5px;
}
.flash-hint::before, .flash-hint::after { content: '·'; opacity: .4; }

/* ── STEPS ── */
.steps-label {
  font-size: .68rem; font-weight: 800;
  color: var(--muted); letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.steps-label::after {
  content: '';
  flex: 1; height: 1.5px;
  background: var(--border);
  border-radius: 2px;
}

.steps { display: flex; flex-direction: column; gap: 0; }

.step {
  display: flex; gap: 14px; align-items: stretch;
  padding: 0;
}

/* connector line */
.step-left {
  display: flex; flex-direction: column; align-items: center;
  flex-shrink: 0;
}
.step-n {
  width: 28px; height: 28px; flex-shrink: 0;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), #f090c0);
  color: #fff;
  font-family: 'Baloo 2', sans-serif;
  font-size: .82rem; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(240,96,144,.3);
  position: relative; z-index: 1;
  transition: transform .18s, box-shadow .18s;
}
.step:hover .step-n {
  transform: scale(1.12);
  box-shadow: 0 4px 14px rgba(240,96,144,.4);
}
.step-line {
  width: 2px; flex: 1;
  background: linear-gradient(to bottom, var(--border2), var(--border));
  border-radius: 2px;
  margin: 3px 0;
  min-height: 10px;
}
.step:last-child .step-line { display: none; }

.step-body {
  padding: 3px 0 16px;
  flex: 1;
}
.step:last-child .step-body { padding-bottom: 0; }
.step-title {
  font-size: .82rem; font-weight: 800; color: var(--ink);
  line-height: 1.3; margin-bottom: 2px;
}
.step-desc {
  font-size: .7rem; color: var(--muted); font-weight: 600; line-height: 1.5;
}
.step-desc code {
  background: var(--pinkL); border: 1px solid var(--border);
  border-radius: 5px; padding: 1px 6px;
  color: var(--pinkD); font-size: .67rem; font-family: monospace;
}

/* ── FOOTER ── */
footer {
  font-size: .68rem; color: var(--muted);
  font-weight: 700; text-align: center;
  line-height: 1.9;
  opacity: 0;
  animation: riseIn .5s ease .55s forwards;
}
footer a { color: var(--muted); text-underline-offset: 3px; }
footer a:hover { color: var(--pink); }
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header>
    <span class="icon">🍡</span>
    <h1>MOCHI<small>Web Flasher</small></h1>
  </header>

  <!-- CARD 1: Flash -->
  <div class="card">

    <div class="device-row">
      <div class="device-thumb">🎮</div>
      <div class="device-info">
        <div class="device-name">MOCHI Watch</div>
        <div class="device-sub">
          ESP32-C3 DevKit
          <span class="dot-ver">v1.0.0</span>
        </div>
      </div>
    </div>

    <div class="specs">
      <div class="spec">
        <span class="spec-icon">🖥️</span>
        <div>
          <div class="spec-val">ST7789</div>
          <div class="spec-key">Display Driver</div>
        </div>
      </div>
      <div class="spec">
        <span class="spec-icon">📐</span>
        <div>
          <div class="spec-val">240 × 240</div>
          <div class="spec-key">Resolusi</div>
        </div>
      </div>
      <div class="spec">
        <span class="spec-icon">💾</span>
        <div>
          <div class="spec-val">LittleFS</div>
          <div class="spec-key">Filesystem</div>
        </div>
      </div>
      <div class="spec">
        <span class="spec-icon">⚡</span>
        <div>
          <div class="spec-val">115200</div>
          <div class="spec-key">Baud Rate</div>
        </div>
      </div>
    </div>

    <div class="flash-wrap">
      <esp-web-install-button manifest="manifest.json">
        <button slot="activate" class="btn-flash">⚡ Flash Firmware</button>
      </esp-web-install-button>
      <p class="flash-hint">Colok MOCHI via USB-C sebelum klik</p>
    </div>

  </div>

  <footer>
    Powered by <a href="https://esphome.github.io/esp-web-tools/" target="_blank">ESP Web Tools</a>
    &nbsp;·&nbsp; <a href="https://github.com/" target="_blank">GitHub</a><br>
    ✦ Made with love ✦
  </footer>

</div>
</body>
</html>
